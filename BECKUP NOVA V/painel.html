<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Webhook - Mensagens e Votos</title>
  <style>
    body { font-family: Arial, sans-serif; padding: 20px; background: #f0f0f0; }
    h1 { color: #333; }

    .tabs { display: flex; gap: 10px; margin-bottom: 10px; }
    .tab-button {
      padding: 10px 20px;
      border: none;
      background: #ccc;
      cursor: pointer;
      border-radius: 5px;
    }
    .tab-button.active { background: #666; color: #fff; }

    .tab-content { display: none; }
    .tab-content.active { display: block; }

    pre {
      background: #fff;
      padding: 20px;
      border: 1px solid #ccc;
      white-space: pre-wrap;
      word-wrap: break-word;
    }
  </style>
</head>
<body>
  <h1>Webhook - Monitoramento</h1>

  <div class="tabs">
    <button class="tab-button active" onclick="mostrarAba('mensagem')">Última Mensagem</button>
    <button class="tab-button" onclick="mostrarAba('votos')">Votos Recebidos</button>
  </div>

  <div id="mensagem" class="tab-content active">
    <pre id="mensagemContent">Carregando mensagem...</pre>
  </div>

  <div id="votos" class="tab-content">
    <pre id="votosContent">Carregando votos...</pre>
  </div>

  <script>
    function mostrarAba(abaId) {
      document.querySelectorAll('.tab-button').forEach(btn => btn.classList.remove('active'));
      document.querySelectorAll('.tab-content').forEach(div => div.classList.remove('active'));

      document.querySelector(`.tab-button[onclick*="${abaId}"]`).classList.add('active');
      document.getElementById(abaId).classList.add('active');
    }

    async function carregarDados() {
      try {
        const resMsg = await fetch('ultima_mensagem.json?_=' + Date.now());
        const jsonMsg = await resMsg.json();
        document.getElementById('mensagemContent').textContent = JSON.stringify(jsonMsg, null, 2);
      } catch {
        document.getElementById('mensagemContent').textContent = "Erro ao carregar a mensagem.";
      }

      try {
        const resVotos = await fetch('votos.json?_=' + Date.now());
        const jsonVotos = await resVotos.json();
        document.getElementById('votosContent').textContent = JSON.stringify(jsonVotos, null, 2);
      } catch {
        document.getElementById('votosContent').textContent = "Nenhum voto registrado ainda.";
      }
    }

    // Atualizar a cada 5 segundos
    setInterval(carregarDados, 5000);
    carregarDados();
  </script>
</body>
</html>
